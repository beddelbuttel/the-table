<!DOCTYPE html>
<html lang="en">
<head>

<title>The Table — Eddelbuttel Nutrition</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500&display=swap');
*{-webkit-box-sizing:border-box;box-sizing:border-box;margin:0;padding:0}
:root{
--sage:#8a9e7e;--sage-l:#eef3eb;--sage-d:#5a6e50;
--warm:#7a7370;--warm-l:#f5f3f0;--warm-d:#4a4442;
--cream:#faf8f5;--bdr:#e8e4df;
--red:#e24b4a;--red-l:#fff0f0;--red-d:#791f1f;
--blue:#378add;--blue-l:#e6f1fb;--blue-d:#0c447c;
--amber:#ef9f27;--amber-l:#faeeda;--amber-d:#633806;
}
body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--warm-d);font-size:14px;min-height:100vh;-webkit-text-size-adjust:100%}
.serif{font-family:'Cormorant Garamond',Georgia,serif}
.hidden{display:none !important}
.login-wrap{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;min-height:100vh;padding:2rem;background:var(--cream)}
.brand{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:400;color:var(--warm);text-align:center}
.sub{font-size:11px;letter-spacing:.18em;color:var(--sage);margin-top:5px;text-transform:uppercase;text-align:center}
.login-card{background:#fff;border:0.5px solid var(--bdr);border-radius:14px;padding:2rem;width:100%;max-width:390px;margin-top:1.5rem}
.login-card h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;margin-bottom:4px}
.login-card p{font-size:13px;color:var(--warm);margin-bottom:1.25rem}
.fg{margin-bottom:1rem}
.fg label{display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--warm);margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 12px;border:0.5px solid var(--bdr);border-radius:8px;font-family:'Jost',sans-serif;font-size:14px;background:#fff;color:var(--warm-d);-webkit-appearance:none;appearance:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--sage)}
.fg textarea{resize:vertical;min-height:70px}
.btn-primary{width:100%;padding:11px;background:var(--warm-d);color:#fff;border:none;border-radius:8px;font-family:'Jost',sans-serif;font-size:14px;cursor:pointer;-webkit-appearance:none}
.btn-primary:hover{background:var(--warm)}
.lerr{background:var(--red-l);border:0.5px solid var(--red);color:var(--red-d);padding:9px 12px;border-radius:8px;font-size:13px;margin-bottom:1rem}
#app{display:none;-webkit-flex-direction:column;flex-direction:column;min-height:100vh}
#app.visible{display:-webkit-flex;display:flex}
.topbar{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:space-between;justify-content:space-between;padding:10px 18px;background:#fff;border-bottom:0.5px solid var(--bdr);-webkit-flex-shrink:0;flex-shrink:0}
.topbar-brand{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--warm)}
.topbar-brand em{font-style:normal;color:var(--sage);font-size:11px;font-family:'Jost',sans-serif;margin-left:10px;letter-spacing:.1em;text-transform:uppercase}
.tr{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:10px}
.rbadge{font-size:11px;padding:3px 10px;border-radius:99px;background:var(--sage-l);color:var(--sage-d)}
.nbtn{background:none;border:none;cursor:pointer;color:var(--warm);font-size:19px;position:relative;padding:0;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center}
.ndot{position:absolute;top:-2px;right:-2px;width:9px;height:9px;border-radius:50%;background:var(--red);border:2px solid #fff;display:none}
.avbtn{width:32px;height:32px;border-radius:50%;background:var(--sage-l);border:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--sage-d);font-family:'Jost',sans-serif}
.navbar{display:-webkit-flex;display:flex;background:#fff;border-bottom:0.5px solid var(--bdr);padding:0 18px;overflow-x:auto;-webkit-flex-shrink:0;flex-shrink:0;-webkit-overflow-scrolling:touch}
.nbtn2{padding:10px 14px;font-size:12px;color:var(--warm);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:'Jost',sans-serif;white-space:nowrap;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:5px}
.nbtn2:hover{color:var(--warm-d)}
.nbtn2.active{color:var(--sage-d);border-bottom-color:var(--sage)}
.pages{-webkit-flex:1;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page{display:none;padding:1.25rem 1.5rem}
.page.active{display:block}
.card{background:#fff;border:0.5px solid var(--bdr);border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem}
.cl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--warm);margin-bottom:10px}
.g2{display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:12px;margin-bottom:1rem}
.g2 > *{-webkit-flex:1 1 140px;flex:1 1 140px}
.g3{display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:10px;margin-bottom:1rem}
.g3 > *{-webkit-flex:1 1 100px;flex:1 1 100px}
.fi label{display:block;font-size:12px;color:var(--warm);margin-bottom:4px}
.fi input,.fi select,.fi textarea{width:100%;padding:7px 10px;border:0.5px solid var(--bdr);border-radius:8px;font-family:'Jost',sans-serif;font-size:13px;background:#fff;color:var(--warm-d);-webkit-appearance:none;appearance:none}
.fi textarea{resize:vertical;min-height:60px}
.fi input:focus,.fi select:focus,.fi textarea:focus{outline:none;border-color:var(--sage)}
.btn{padding:7px 14px;border:0.5px solid var(--bdr);border-radius:7px;background:#fff;font-family:'Jost',sans-serif;font-size:12px;cursor:pointer;color:var(--warm-d);display:-webkit-inline-flex;display:inline-flex;-webkit-align-items:center;align-items:center;gap:5px;-webkit-appearance:none}
.btn:hover{background:var(--warm-l)}
.bs{background:var(--sage-l);border-color:var(--sage);color:var(--sage-d)}.bs:hover{background:#dde9d8}
.bd{background:var(--warm-d);color:#fff;border-color:var(--warm-d)}.bd:hover{background:var(--warm)}
.bb{background:var(--blue-l);border-color:var(--blue);color:var(--blue-d)}
.br{background:var(--red-l);border-color:var(--red);color:var(--red-d)}
.ba{background:var(--amber-l);border-color:var(--amber);color:var(--amber-d)}
.bfull{width:100%;-webkit-justify-content:center;justify-content:center;padding:10px}
.tag{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;margin:2px;background:var(--warm-l);color:var(--warm-d)}
.tg{background:var(--sage-l);color:var(--sage-d)}
.tr2{background:var(--red-l);color:var(--red-d);border:0.5px solid var(--red)}
.ta{background:var(--amber-l);color:var(--amber-d)}
.tb{background:var(--blue-l);color:var(--blue-d)}
.sbadge{display:-webkit-inline-flex;display:inline-flex;-webkit-align-items:center;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:500}
.sd{background:var(--warm-l);color:var(--warm)}
.sp{background:var(--amber-l);color:var(--amber-d)}
.sa{background:var(--blue-l);color:var(--blue-d)}
.ss{background:var(--sage-l);color:var(--sage-d)}
.sr{background:#fbeaf0;color:#993556}
.sc{background:var(--sage-l);color:var(--sage-d)}
.empty{text-align:center;padding:2.5rem;color:var(--warm);font-size:13px}
.cal-grid{display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap}
.cal-hdr{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--warm);text-align:center;padding:5px 0;width:14.28%}
.cal-day{background:#fff;border:0.5px solid var(--bdr);border-radius:7px;min-height:74px;padding:5px;cursor:pointer;width:14.28%;-webkit-box-sizing:border-box;box-sizing:border-box}
.cal-day:hover{border-color:var(--sage)}
.cal-day.today{border:1.5px solid var(--sage)}
.cal-day.omo{opacity:.3}
.cdnum{font-size:11px;font-weight:500;margin-bottom:3px}
.cev{font-size:9px;padding:2px 4px;border-radius:3px;margin-bottom:2px;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cev.cancelled{opacity:.5;text-decoration:line-through}
.wf-steps{display:-webkit-flex;display:flex;margin-bottom:1.5rem;overflow-x:auto;-webkit-overflow-scrolling:touch}
.wfs{-webkit-flex:1;flex:1;min-width:70px;text-align:center;padding:10px 4px;border-top:3px solid var(--bdr)}
.wfs.done{border-top-color:var(--sage)}
.wfs.active{border-top-color:var(--blue)}
.wfn{width:20px;height:20px;border-radius:50%;background:var(--bdr);display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;font-size:10px;font-weight:500;margin:0 auto 5px;color:var(--warm)}
.wfs.done .wfn{background:var(--sage);color:#fff}
.wfs.active .wfn{background:var(--blue);color:#fff}
.wfl{font-size:10px;color:var(--warm);line-height:1.3}
.ms{background:var(--cream);border:0.5px solid var(--bdr);border-radius:7px;padding:8px 10px;margin-bottom:6px}
.ms.flagged{background:var(--red-l);border-color:var(--red)}
.ms.drag-over{border:2px dashed var(--sage);background:var(--sage-l)}
.pbadge{display:-webkit-inline-flex;display:inline-flex;-webkit-align-items:center;align-items:center;gap:3px;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:500}
.pf{background:var(--sage-l);color:var(--sage-d)}
.pg{background:var(--blue-l);color:var(--blue-d)}
.pi{background:var(--amber-l);color:var(--amber-d)}
.mtb{background:var(--amber-l);color:var(--amber-d)}
.mtl{background:var(--blue-l);color:var(--blue-d)}
.mtd{background:var(--sage-l);color:var(--sage-d)}
.mts{background:#fbeaf0;color:#993556}
.rot-shelf{background:var(--sage-l);border:0.5px solid var(--sage);border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem}
.rot-title{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--sage-d);margin-bottom:10px}
.rot-card{background:#fff;border:0.5px solid var(--sage);border-radius:8px;padding:10px 12px;margin-bottom:8px;display:-webkit-flex;display:flex;-webkit-align-items:flex-start;align-items:flex-start;-webkit-justify-content:space-between;justify-content:space-between;gap:8px}
.avoid-shelf{background:var(--red-l);border:0.5px solid var(--red);border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem}
.mgrid{display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:10px;margin-bottom:1rem}
.mgrid > .mc{-webkit-flex:1 1 150px;flex:1 1 150px}
.mc{background:#fff;border:0.5px solid var(--bdr);border-radius:10px;padding:12px}
.mcav{width:34px;height:34px;border-radius:50%;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;font-size:13px;font-weight:500;color:#fff;margin-bottom:8px}
.abanner{background:var(--red-l);border:0.5px solid var(--red);border-radius:8px;padding:10px 14px;margin-bottom:1rem;font-size:13px;color:var(--red-d);line-height:1.7}
.cls{background:#fff;border:0.5px solid var(--bdr);border-radius:10px;margin-bottom:10px;overflow:hidden}
.clsh{display:-webkit-flex;display:flex;-webkit-justify-content:space-between;justify-content:space-between;-webkit-align-items:center;align-items:center;padding:11px 14px;background:var(--warm-l);cursor:pointer}
.clpb{height:3px;background:var(--bdr)}
.clpf{height:100%;background:var(--sage)}
.clib{padding:6px 14px}
.cli{display:-webkit-flex;display:flex;-webkit-align-items:flex-start;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--bdr)}
.cli:last-child{border-bottom:none}
.cli input[type=checkbox]{width:17px;height:17px;margin-top:2px;cursor:pointer;accent-color:var(--sage-d);-webkit-flex-shrink:0;flex-shrink:0}
.clit{font-size:13px;line-height:1.5;-webkit-flex:1;flex:1}
.clit.crit{color:var(--red-d);font-weight:500}
.clin{font-size:11px;color:var(--warm);margin-top:3px}
.opbar{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:12px;padding:12px 14px;background:#fff;border:0.5px solid var(--bdr);border-radius:10px;margin-bottom:1rem}
.ai-ctx{background:var(--sage-l);border:0.5px solid var(--sage);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--sage-d);line-height:1.7}
.aichat{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;gap:8px;max-height:320px;overflow-y:auto;margin-bottom:10px;-webkit-overflow-scrolling:touch}
.aim{padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.65;max-width:90%}
.aim.ai{background:#fff;border:0.5px solid var(--bdr)}
.aim.ai.intro{background:var(--cream);border-color:var(--sage)}
.aim.user{background:var(--sage-l);color:var(--sage-d);margin-left:auto;max-width:75%}
.aim.flag{background:var(--red-l);border:0.5px solid var(--red);color:var(--red-d)}
.aim.thinking{background:var(--warm-l);color:var(--warm);font-style:italic;border:0.5px dashed var(--bdr)}
.aiinput{display:-webkit-flex;display:flex;gap:8px}
.aiinput textarea{-webkit-flex:1;flex:1;padding:9px 12px;border:0.5px solid var(--bdr);border-radius:8px;font-family:'Jost',sans-serif;font-size:13px;background:#fff;resize:none;min-height:42px;max-height:100px;line-height:1.5;-webkit-appearance:none}
.aiinput textarea:focus{outline:none;border-color:var(--sage)}
.qpb{padding:5px 10px;border:0.5px solid var(--bdr);border-radius:99px;font-size:11px;cursor:pointer;background:#fff;color:var(--warm-d);font-family:'Jost',sans-serif;white-space:nowrap;-webkit-appearance:none}
.qpb:hover{background:var(--sage-l);border-color:var(--sage);color:var(--sage-d)}
.star{font-size:22px;cursor:pointer;color:#ddd;line-height:1}
.star.on{color:var(--amber)}
.thb{padding:6px 12px;border:0.5px solid var(--bdr);border-radius:7px;background:#fff;font-size:17px;cursor:pointer;-webkit-appearance:none}
.thb.up{background:var(--sage-l);border-color:var(--sage)}
.thb.dn{background:var(--red-l);border-color:var(--red)}
.pb{padding:4px 10px;border:0.5px solid var(--bdr);border-radius:99px;font-size:12px;cursor:pointer;background:#fff;font-family:'Jost',sans-serif;-webkit-appearance:none}
.pb.on{background:var(--sage-l);border-color:var(--sage);color:var(--sage-d)}
.pb.on-no{background:var(--red-l);border-color:var(--red);color:var(--red-d)}
.pb.on-tw{background:var(--amber-l);border-color:var(--amber);color:var(--amber-d)}
.mthread{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;gap:8px;max-height:260px;overflow-y:auto;margin-bottom:10px;-webkit-overflow-scrolling:touch}
.msg{padding:9px 12px;border-radius:10px;font-size:13px;line-height:1.5;max-width:82%}
.msg.me{background:var(--sage-l);color:var(--sage-d);margin-left:auto}
.msg.them{background:#fff;border:0.5px solid var(--bdr)}
.minput{display:-webkit-flex;display:flex;gap:8px}
.minput input{-webkit-flex:1;flex:1;padding:9px 12px;border:0.5px solid var(--bdr);border-radius:8px;font-family:'Jost',sans-serif;font-size:13px;-webkit-appearance:none}
.minput input:focus{outline:none;border-color:var(--sage)}
.wstabs{display:-webkit-flex;display:flex;border-bottom:0.5px solid var(--bdr);background:#fff;padding:0 1.5rem;overflow-x:auto;margin:-1.25rem -1.5rem 1.25rem;-webkit-overflow-scrolling:touch}
.wstab{padding:10px 13px;font-size:12px;color:var(--warm);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:'Jost',sans-serif;white-space:nowrap;-webkit-appearance:none}
.wstab:hover{color:var(--warm-d)}
.wstab.active{color:var(--sage-d);border-bottom-color:var(--sage)}
.gst{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--warm);margin:12px 0 6px;padding-bottom:4px;border-bottom:0.5px solid var(--bdr)}
.gi{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:10px;padding:6px 0;border-bottom:0.5px solid var(--bdr);font-size:13px}
.gi:last-child{border-bottom:none}
.gi input[type=checkbox]{width:15px;height:15px;accent-color:var(--sage-d)}
.modal-ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;-webkit-align-items:flex-start;align-items:flex-start;-webkit-justify-content:center;justify-content:center;padding-top:40px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-ov.open{display:-webkit-flex;display:flex}
.modal-box{background:#fff;border-radius:12px;padding:1.5rem;width:100%;max-width:380px;border:0.5px solid var(--bdr);margin:0 1rem 2rem}
.modal-box h3{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;margin-bottom:1.25rem}
.mlink{background:none;border:none;color:var(--sage-d);font-family:'Jost',sans-serif;font-size:12px;cursor:pointer;text-decoration:underline;margin-top:.75rem;display:block;text-align:center;-webkit-appearance:none}
.trow{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:space-between;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid var(--bdr)}
.trow:last-child{border-bottom:none}
.nitem{display:-webkit-flex;display:flex;-webkit-align-items:flex-start;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--bdr);cursor:pointer}
.nitem:hover{background:var(--warm-l);margin:0 -1rem;padding:9px 1rem}
.nitem:last-child{border-bottom:none}
.nico{width:28px;height:28px;border-radius:50%;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;font-size:13px;-webkit-flex-shrink:0;flex-shrink:0}
.rec-tag{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;margin:2px;cursor:pointer;border:0.5px solid var(--bdr);background:#fff;color:var(--warm-d);font-family:'Jost',sans-serif}
.rec-tag.on{background:var(--sage-l);border-color:var(--sage);color:var(--sage-d)}
.day-col{background:#fff;border:0.5px solid var(--bdr);border-radius:8px;padding:8px;margin-bottom:8px;min-height:80px}
.day-col.drag-over{border:2px dashed var(--sage);background:var(--sage-l)}

</head>
<body>
<div id="vlogin">
<div class="login-wrap">
  <div><div class="brand serif">Eddelbuttel Nutrition</div><div class="sub">The Nourished Table · Weekly Chef Services</div></div>
  <div class="login-card">
    <h2 class="serif">Sign in to The Table</h2>
    <p>Enter your email and password to continue.</p>
    <div id="lerr" class="lerr hidden">Incorrect email or password.</div>
    <div class="fg"><label>Email address</label><input type="email" id="lemail" placeholder="you@example.com" autocomplete="email"></div>
    <div class="fg"><label>Password</label><input type="password" id="lpw" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn-primary" id="sinbtn">Sign in</button>
  </div>
</div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-brand serif">The Table <em>Eddelbuttel Nutrition</em></div>
    <div class="tr">
      <button class="nbtn" id="nbell" onclick="go('notifications')" aria-label="Notifications"><i class="ti ti-bell" style="font-size:19px"></i><div class="ndot" id="ndot"></div></button>
      <span class="rbadge" id="rbadge">Chef</span>
      <button class="avbtn" id="avbtn" onclick="signOut()" title="Sign out">B</button>
    </div>
  </div>
  <div class="navbar" id="navbar"></div>
  <div class="pages">
    <div id="p-calendar" class="page"></div>
    <div id="p-hours" class="page"></div>
    <div id="p-clients" class="page"></div>
    <div id="p-workspace" class="page"></div>
    <div id="p-ai" class="page"></div>
    <div id="p-recipes" class="page"></div>

function rCal() {
  var yr = S.calYear, mo = S.calMonth;
  var first = new Date(yr, mo, 1).getDay();

  var clients = myC();

  var today = new Date(); var todayD = today.getDate(), todayM = today.getMonth(), todayY = today.getFullYear();

  // Build event list per day
  function getDayEvs(d) {
    var dow = new Date(yr, mo, d).getDay();
    var out = [];
    for (var ci = 0; ci < clients.length; ci++) {
      var c = clients[ci];
      var key = yr + '-' + mo + '-' + d;
      var se = c.serviceEvents || {};
      var sev = se[key] || {status:'scheduled', chefId:c.chefId};
      var canc = sev.status === 'cancelled';
      var achef = sev.chefId || c.chefId;
      var swapped = sev.chefId && sev.chefId !== c.chefId;
      var n = c.name.replace('The ','').replace(' Family','');
      var md = (c.serviceDay - (c.menuDaysBefore || 6) + 14) % 7;
      if (dow === c.serviceDay) {
        out.push({label:(canc?'[X] ':swapped?'[↔] ':'')+n, bg:canc?'#f7c1c1':cc(achef), tc:'#173404', canc:canc});
      }
      if (dow === md && !canc) {
        out.push({label:n+': menu due', bg:'#b5d4f4', tc:'#0c447c'});
      }
      if (dow === 5 && (S.role === 'manager' || S.role === 'dietitian')) {
        out.push({label:'Check-in: '+n, bg:'#f4c0d1', tc:'#72243e'});
      }
    }
    return out.slice(0,3);
  }

  var cells = '';
  var prevDim = new Date(yr, mo, 0).getDate();
  for (var i = 0; i < first; i++) {
    cells += '<div class="cal-day omo"><div class="cdnum" style="color:var(--bdr)">' + (prevDim - first + i + 1) + '</div></div>';
  }
  for (var d = 1; d <= dim; d++) {
    var ev = getDayEvs(d);
    var isToday = d === todayD && mo === todayM && yr === todayY;
    var evHtml = '';
    for (var ei = 0; ei < ev.length; ei++) {

      '<div class="cdnum">' + d + '</div>' + evHtml + '</div>';

    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;flex-wrap:wrap;gap:8px">' +

      (legendChefs ? '<div style="display:flex;gap:6px;flex-wrap:wrap">' + legendChefs + '</div>' : '') +
    '</div>' +
    '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;font-size:11px">' +
      '<span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#c0dd97;margin-right:3px"></span>Service</span>' +
      '<span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#b5d4f4;margin-right:3px"></span>Menu due</span>' +

      cells +
    '</div>' +
    '<div style="font-size:12px;color:var(--warm);margin-top:.75rem;text-align:center">Tap any day to manage · cancel service · swap chefs</div>';
}

function doCancel(i) {

  addN('Service cancelled: ' + c.name + ' — ' + DAYS[new Date(S.calYear,S.calMonth,d).getDay()] + ' ' + d, ['dietitian','manager'], [], null);
  closeM(); rCal();
}
function doReinstate(i) {
  var ev = _modalEvs[i]; if (!ev) return;

function doSwap(i) {

function saveSwap() {

function openWS(id) { S.wsCid = id; S.wsTab = 'profile'; go('workspace'); }
function delClient(id) {

// ── MENU WORKFLOW ─────────────────────────────────────────────────────────────
function rMenu(c) {
  // 7-step workflow: draft → pending → approved → sent → client_approved → grocery_ready → complete
  var steps = [
    {l:'Build menu',       done: c.menuStatus!=='draft', act: c.menuStatus==='draft'},
    {l:'Dietitian OK',     done: ['approved','sent','client_approved','grocery_ready','complete'].indexOf(c.menuStatus)>=0, act: c.menuStatus==='pending'},
    {l:'Send to client',   done: ['sent','client_approved','grocery_ready','complete'].indexOf(c.menuStatus)>=0, act: c.menuStatus==='approved'},
    {l:'Client approves',  done: ['client_approved','grocery_ready','complete'].indexOf(c.menuStatus)>=0, act: c.menuStatus==='sent'||c.menuStatus==='revised'},
    {l:'Build grocery list', done: ['grocery_ready','complete'].indexOf(c.menuStatus)>=0, act: c.menuStatus==='client_approved'},
    {l:'Send grocery list', done: c.menuStatus==='complete', act: c.menuStatus==='grocery_ready'},
    {l:'Service',          done: false, act: c.menuStatus==='complete'}
  ];
  var stepsHtml = '<div class="wf-steps">';
  for (var i=0;i<steps.length;i++) {
    stepsHtml += '<div class="wfs '+(steps[i].done?'done':steps[i].act?'active':'')+'"><div class="wfn">'+(steps[i].done?'<i class="ti ti-check" style="font-size:10px"></i>':(i+1))+'</div><div class="wfl">'+steps[i].l+'</div></div>';
  }
  stepsHtml += '</div>';

  var acts = '';
  if (c.menuStatus==='draft' && (S.role==='chef'||S.role==='dietitian')) acts += '<button class="btn bb" onclick="wfAct(\'pending\','+c.id+')">Submit for dietitian sign-off</button>';
  if (c.menuStatus==='pending' && S.role==='dietitian') acts += '<button class="btn bs" onclick="wfAct(\'approved\','+c.id+')"><i class="ti ti-check"></i> Approve menu</button><button class="btn br" onclick="wfAct(\'draft\','+c.id+')">Send back</button>';
  if (c.menuStatus==='approved' && (S.role==='chef'||S.role==='dietitian')) acts += '<button class="btn bd" onclick="wfAct(\'sent\','+c.id+')">Send menu to client for approval</button>';
  if (S.role==='client' && (c.menuStatus==='sent'||c.menuStatus==='revised')) acts += '<button class="btn bs" onclick="wfAct(\'client_approved\','+c.id+')"><i class="ti ti-check"></i> Approve this menu</button>';
  if (c.menuStatus==='client_approved' && (S.role==='chef'||S.role==='dietitian')) acts += '<button class="btn bb" onclick="buildGroceryList('+c.id+')"><i class="ti ti-shopping-cart"></i> Build grocery list</button>';
  if (c.menuStatus==='grocery_ready' && (S.role==='chef'||S.role==='dietitian')) acts += '<button class="btn bd" onclick="wfAct(\'complete\','+c.id+')">Send grocery list to client</button>';

  // Rotation shelf
  var rotShelf = '';
  if ((S.role==='chef'||S.role==='dietitian') && c.rotationBank && c.rotationBank.length) {
    rotShelf = '<div class="rot-shelf"><div class="rot-title"><i class="ti ti-bookmark" style="font-size:13px;margin-right:5px"></i>Client rotation — approved meals</div>';
    for (var i=0;i<c.rotationBank.length;i++) {
      var rm = c.rotationBank[i];
      rotShelf += '<div class="rot-card"><div style="flex:1"><div style="font-weight:500;font-size:13px">'+esc(rm.name)+'</div>' +
        '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:4px">'+mtb(rm.mealType||'Dinner')+'<span style="color:var(--amber);font-size:12px">'+stars(rm.stars||0)+'</span>' +
        '<span class="tag '+(rm.repeat==='Yes'?'tg':rm.repeat==='No'?'tr2':'ta')+'" style="font-size:10px">'+esc(rm.repeat||'')+'</span></div>' +
        (rm.note?'<div style="font-size:11px;color:var(--warm);font-style:italic;margin-top:3px">"'+esc(rm.note)+'"</div>':'') +
        '</div><button class="btn bs" style="font-size:11px;padding:4px 8px;flex-shrink:0" onclick="addRotToMenu(\''+esc(rm.name)+'\','+c.id+')"><i class="ti ti-plus" style="font-size:11px"></i> Add</button></div>';
    }
    rotShelf += '</div>';
  }

  // Avoid shelf
  var avoidShelf = '';
  if ((S.role==='chef'||S.role==='dietitian') && c.avoidBank && c.avoidBank.length) {
    avoidShelf = '<div class="avoid-shelf"><div style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--red-d);margin-bottom:8px"><i class="ti ti-ban" style="font-size:13px;margin-right:5px"></i>Don\'t repeat — client flagged</div>';
    for (var i=0;i<c.avoidBank.length;i++) {
      var am = c.avoidBank[i];
      avoidShelf += '<div style="padding:6px 0;border-bottom:0.5px solid #f0c0c0;font-size:13px"><strong>'+esc(am.name)+'</strong>'+(am.note?' — <span style="font-style:italic;color:var(--red-d)">"'+esc(am.note)+'"</span>':'')+'</div>';
    }
    avoidShelf += '</div>';
  }

  // Client edit banner
  var clientBanner = '';
  if (S.role==='client' && (c.menuStatus==='sent'||c.menuStatus==='revised')) {
    clientBanner = '<div style="background:var(--sage-l);border:0.5px solid var(--sage);border-radius:8px;padding:10px 14px;margin-bottom:1rem;font-size:13px;color:var(--sage-d)">' +
      '<i class="ti ti-edit" style="font-size:13px;margin-right:6px"></i><strong>You can edit this week\'s menu.</strong> Tap <strong>Edit</strong> on any meal to change it, or <strong>Remove</strong> to take it off. Changes go to your chef automatically.</div>';
  }

  // Weekly meals grid with drag support
  var mgrid = '';
  for (var di=0; di<WDAYS.length; di++) {
    var day = WDAYS[di];
    var meals = (c.weeklyMeals || {})[day] || [];
    mgrid += '<div class="day-col" id="dc-'+day+'" ondragover="event.preventDefault();this.classList.add(\'drag-over\')" ondragleave="this.classList.remove(\'drag-over\')" ondrop="dropMeal(event,\''+day+'\','+c.id+')">' +
      '<div style="font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--warm-d);margin-bottom:8px">'+day+'</div>';
    for (var mi=0; mi<meals.length; mi++) {
      var m = meals[mi];
      var flagged = false;
      if (c.avoidBank) { for(var ai=0;ai<c.avoidBank.length;ai++) { if(c.avoidBank[ai].name.toLowerCase()===m.name.toLowerCase()) { flagged=true; break; } } }
      var clientCanEdit = S.role==='client' && (c.menuStatus==='sent'||c.menuStatus==='revised');
      mgrid += '<div class="ms'+(flagged?' flagged':'')+'" draggable="true" ondragstart="dragStart(event,\''+day+'\','+mi+','+c.id+')" ondragend="dragEnd()">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;flex-wrap:wrap;gap:4px">' +
          '<span style="font-weight:500;font-size:13px;cursor:grab">⠿ '+esc(m.name)+(flagged?' <span style="font-size:10px;color:var(--red-d)">⚠ flagged</span>':'')+'</span>' +
          '<div style="display:flex;gap:4px">' +
            (clientCanEdit ? '<button class="btn bs" style="padding:2px 6px;font-size:10px" onclick="clientEditMeal(\''+day+'\','+mi+','+c.id+')"><i class="ti ti-edit" style="font-size:10px"></i> Edit</button>' +
              '<button class="btn br" style="padding:2px 6px;font-size:10px" onclick="clientRemoveMeal(\''+day+'\','+mi+','+c.id+')"><i class="ti ti-x" style="font-size:10px"></i> Remove</button>' : '') +
            (S.role!=='client' ? '<button class="btn" style="padding:2px 5px;font-size:10px" onclick="rmMeal(\''+day+'\','+mi+','+c.id+')"><i class="ti ti-x" style="font-size:10px"></i></button><button class="btn" style="padding:2px 5px;font-size:10px" onclick="tapMoveMeal(\''+day+'\','+mi+','+c.id+')"><i class="ti ti-arrows-move" style="font-size:10px"></i></button>' : '') +
          '</div>' +
        '</div>' +
        '<div style="display:flex;gap:4px;flex-wrap:wrap">'+mtb(m.mealType)+pkb(m.packaging)+'<span class="tag" style="font-size:10px">'+esc(m.servings||'')+' serv</span>'+(m.forWho?'<span style="font-size:10px;color:var(--warm)">'+esc(m.forWho)+'</span>':'')+'</div>' +
        (m.notes?'<div style="font-size:11px;color:var(--warm);font-style:italic;margin-top:3px">'+esc(m.notes)+'</div>':'') +
      '</div>';
    }
    if (S.role!=='client') {
      mgrid += '<button class="btn bs" style="width:100%;justify-content:center;font-size:11px;padding:5px;margin-top:4px" onclick="addMealM(\''+day+'\','+c.id+')"><i class="ti ti-plus" style="font-size:11px"></i> Add meal</button>';
    }
    mgrid += '</div>';
  }

  var grocery = '';
  if (c.groceryList && c.groceryList.length) {
    var groceryStatus = c.menuStatus==='grocery_ready'?'<span class="tag ta" style="margin-left:6px">Ready to send</span>':c.menuStatus==='complete'?'<span class="tag tg" style="margin-left:6px">Sent to client</span>':'';
    grocery = '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div class="cl" style="margin:0">Grocery list'+groceryStatus+'</div>'+(S.role==='client'?'<span class="tag tg">Your list</span>':'')+'</div>';
    for (var i=0;i<c.groceryList.length;i++) {
      var gs = c.groceryList[i];
      grocery += '<div class="gst">'+esc(gs.cat)+'</div>';
      for (var j=0;j<gs.items.length;j++) grocery += '<div class="gi"><input type="checkbox"> <span>'+esc(gs.items[j])+'</span></div>';
    }
    grocery += '</div>';
  }

  return stepsHtml + rotShelf + avoidShelf + clientBanner +
    '<div class="card">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">' +
        '<div style="display:flex;align-items:center;gap:8px"><div class="cl" style="margin:0">Weekly meals</div>'+sb(c.menuStatus)+'</div>' +
        '<div style="display:flex;gap:6px;flex-wrap:wrap">'+acts+'</div>' +
      '</div>' + mgrid +
    '</div>' + grocery;
}

// tap-to-move (mobile friendly)
var _tapMove = null;
function tapMoveMeal(day, idx, cid) {
  var c = gc(cid); if(!c) return;
  var meals = c.weeklyMeals[day] || [];
  var m = meals[idx]; if(!m) return;
  _tapMove = {day:day, idx:idx, cid:cid};
  var html = '<h3 class="serif">Move meal</h3><p style="font-size:13px;color:var(--warm);margin-bottom:1rem"><strong>' + esc(m.name) + '</strong> is on ' + day + '. Move to:</p>';
  for(var i=0;i<WDAYS.length;i++){
    if(WDAYS[i] !== day) {
      html += '<button class="btn bs bfull" style="margin-bottom:6px" id="mv-' + WDAYS[i] + '">' + WDAYS[i] + '</button>';
    }
  }
  html += '<button class="mlink" onclick="_tapMove=null;closeM()">Cancel</button>';
  openM(html);
  for(var i=0;i<WDAYS.length;i++){
    if(WDAYS[i] !== day) {
      (function(d){ var btn=document.getElementById('mv-'+d); if(btn) btn.onclick=function(){moveMealTo(d);}; })(WDAYS[i]);
    }
  }
}
function moveMealTo(toDay) {
  if(!_tapMove) { closeM(); return; }
  var c = gc(_tapMove.cid); if(!c) return;
  if(!c.weeklyMeals[toDay]) c.weeklyMeals[toDay]=[];
  var meal = c.weeklyMeals[_tapMove.day].splice(_tapMove.idx,1)[0];
  c.weeklyMeals[toDay].push(meal);
  _tapMove = null;
  saveData(); closeM(); rWS();
}
// drag & drop
function dragStart(e, day, idx, cid) { _dragDay=day; _dragIdx=idx; _dragCid=cid; e.dataTransfer.effectAllowed='move'; }
function dragEnd() { var cols=document.querySelectorAll('.day-col'); for(var i=0;i<cols.length;i++) cols[i].classList.remove('drag-over'); }
function dropMeal(e, toDay, cid) {
  e.preventDefault();
  var col = document.getElementById('dc-'+toDay); if(col) col.classList.remove('drag-over');
  if (_dragDay===null||_dragIdx===null||_dragCid===null) return;
  var c = gc(cid); if(!c) return;
  if (!c.weeklyMeals[toDay]) c.weeklyMeals[toDay]=[];
  var meal = c.weeklyMeals[_dragDay].splice(_dragIdx,1)[0];
  c.weeklyMeals[toDay].push(meal);
  _dragDay=null;_dragIdx=null;_dragCid=null;
  rWS();
}

function wfAct(status, cid) {
  var c = gc(cid); if(!c) return;
  c.menuStatus = status;
  if (status==='sent') {
    var cu = null; for(var i=0;i<TEAM.length;i++){if(TEAM[i].clientId===cid){cu=TEAM[i];break;}}
    if (cu) emailTo(cu.email,'Your menu is ready for approval — '+c.name,'Hi '+c.contact+',\n\nYour chef has built this week\'s menu and it\'s ready for your review. Log in to approve or request changes.\n\n'+CFG.appUrl+'\n\n'+CFG.fromName);
    addN('Menu sent to '+c.contact+' for approval',[],[c.chefId],{page:'workspace',wsCid:cid,wsTab:'menu'});
  }
  if (status==='pending') {

function buildGroceryList(cid) {
  var c = gc(cid); if(!c) return;
  // Auto-generate grocery list from recipe bank
  var proteins=[],produce=[],pantry=[],dairy=[],other=[];
  var wdays=WDAYS;
  for(var i=0;i<wdays.length;i++){
    var meals=(c.weeklyMeals||{})[wdays[i]]||[];
    for(var j=0;j<meals.length;j++){
      var m=meals[j];
      // Find in recipe bank
      var rec=null;for(var k=0;k<RECIPES.length;k++){if(RECIPES[k].name.toLowerCase()===m.name.toLowerCase()){rec=RECIPES[k];break;}}
      if(rec&&rec.ingredients){
        var lines=rec.ingredients.split('\n');
        for(var l=0;l<lines.length;l++){
          var line=lines[l].trim();if(!line)continue;
          var low=line.toLowerCase();
          if(low.match(/chicken|beef|turkey|salmon|pork|shrimp|tuna|lamb|egg/)) proteins.push(line);
          else if(low.match(/tomato|lettuce|onion|pepper|carrot|broccoli|spinach|avocado|fruit|apple|berry|lemon|lime|garlic|herb|basil|cilantro|parsley/)) produce.push(line);
          else if(low.match(/pasta|rice|bread|flour|oil|sauce|can|box|jar|spice|salt|pepper|sugar|vinegar|stock|broth/)) pantry.push(line);
          else if(low.match(/milk|cheese|butter|cream|yogurt/)) dairy.push(line);
          else other.push(line);
        }
      }
    }
  }
  var gl=[];
  if(proteins.length) gl.push({cat:'Proteins',items:dedupe(proteins)});
  if(produce.length) gl.push({cat:'Produce',items:dedupe(produce)});
  if(pantry.length) gl.push({cat:'Pantry',items:dedupe(pantry)});
  if(dairy.length) gl.push({cat:'Dairy',items:dedupe(dairy)});
  if(other.length) gl.push({cat:'Other',items:dedupe(other)});
  if(!gl.length) gl=[{cat:'Proteins',items:['Add proteins...']},{cat:'Produce',items:['Add produce...']},{cat:'Pantry',items:['Add pantry items...']}];
  c.groceryList=gl;
  c.menuStatus='grocery_ready';
  addN('Grocery list built for '+c.name+' — review before sending',[],[c.chefId],{page:'workspace',wsCid:cid,wsTab:'menu'});
  saveData(); rWS();
}

// Parse AI response for meal suggestions and add to weekly menu
function parseAIMeals(text) {
  // Look for numbered or bulleted meal suggestions
  var meals = [];
  var lines = text.split('\n');
  var dayOrder = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  var dayIdx = 0;
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    // Match: "1. Meal name", "- Meal name", "• Meal name", "**Meal name**"
    var m = line.match(/^(?:\d+[\.\)]|[-•*]|\*\*)\s*(.+?)(?:\*\*)?(?:\s*[-—:].+)?$/);
    if (m) {
      var name = m[1].replace(/\*\*/g, '').trim();
      // Filter out non-meal lines (short words, headers)
      if (name.length > 4 && name.length < 80 && name.split(' ').length >= 2) {
        meals.push({name: name, day: dayOrder[dayIdx % 7], mealType: 'Dinner', servings: '4-6', packaging: 'Family style', forWho: 'Whole family', notes: ''});
        dayIdx++;
      }
    }
  }
  return meals;
}

function showAddToMenuModal(cid, meals) {
  var c = gc(cid); if(!c) return;
  if (!meals || !meals.length) { alert('No meals detected in this response. Try asking for a numbered list of meal ideas.'); return; }
  var rows = '';
  for (var i = 0; i < meals.length; i++) {
    var m = meals[i];
    var dayOpts = '';
    for (var j = 0; j < WDAYS.length; j++) {
      dayOpts += '<option value="' + WDAYS[j] + '"' + (WDAYS[j] === m.day ? ' selected' : '') + '>' + WDAYS[j] + '</option>';
    }
    rows += '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--bdr);flex-wrap:wrap">' +
      '<input type="checkbox" id="aim-cb-' + i + '" checked style="width:16px;height:16px;accent-color:var(--sage-d);flex-shrink:0">' +
      '<input id="aim-n-' + i + '" value="' + esc(m.name) + '" style="flex:1;min-width:140px;padding:5px 8px;border:0.5px solid var(--bdr);border-radius:6px;font-family:Jost,sans-serif;font-size:12px">' +
      '<select id="aim-d-' + i + '" style="padding:5px 8px;border:0.5px solid var(--bdr);border-radius:6px;font-family:Jost,sans-serif;font-size:12px">' + dayOpts + '</select>' +
    '</div>';
  }
  openM('<h3 class="serif">Add AI meals to menu</h3>' +
    '<p style="font-size:13px;color:var(--warm);margin-bottom:1rem">Review and adjust each meal. Uncheck any you do not want. Each will be added to the selected day.</p>' +
    rows +
    '<button class="btn bd bfull" style="margin-top:1rem" onclick="confirmAddAIMeals(' + cid + ',' + meals.length + ')"><i class="ti ti-plus"></i> Add checked meals to menu</button>' +
    '<button class="mlink" onclick="closeM()">Cancel</button>');
}

function confirmAddAIMeals(cid, count) {
  var c = gc(cid); if(!c) return;
  var added = 0;
  for (var i = 0; i < count; i++) {
    var cb = document.getElementById('aim-cb-' + i);
    if (!cb || !cb.checked) continue;
    var nameEl = document.getElementById('aim-n-' + i);
    var dayEl = document.getElementById('aim-d-' + i);
    if (!nameEl || !dayEl) continue;
    var name = nameEl.value.trim();
    var day = dayEl.value;
    if (!name) continue;
    if (!c.weeklyMeals) c.weeklyMeals = {Mon:[],Tue:[],Wed:[],Thu:[],Fri:[],Sat:[],Sun:[]};
    if (!c.weeklyMeals[day]) c.weeklyMeals[day] = [];
    c.weeklyMeals[day].push({id:'m'+Date.now()+i, name:name, mealType:'Dinner', servings:'4-6', packaging:'Family style', forWho:'Whole family', notes:'Added from AI suggestion'});
    added++;
  }
  saveData();
  closeM();
  // Navigate to menu tab
  S.wsCid = cid;
  S.wsTab = 'menu';
  go('workspace');
  alert(added + ' meal' + (added !== 1 ? 's' : '') + ' added to the menu!');
}

function clearAI(cid){S.aiH[cid]=[];var c=gc(cid);if(c)buildAIIntro(c);rAI();}
function qpSend(cid,idx){var qps=$('p-ai')._qps;if(!qps||!qps[idx])return;var i=$('aiinp');if(i)i.value=qps[idx].p;sendAI(cid);}
function sendAI(cid){
  var inp=$('aiinp');var t=inp?inp.value.trim():'';if(!t)return;if(inp)inp.value='';
  var c=gc(cid);if(!c)return;
  if(!S.aiH[c.id])S.aiH[c.id]=[];
  S.aiH[c.id].push({role:'user',content:t});
  var chat=$('aichat');
  if(chat){chat.innerHTML+='<div class="aim user">'+t.replace(/\n/g,'<br>')+'</div>';var th=document.createElement('div');th.className='aim ai thinking';th.id='aith';th.textContent='Thinking about '+c.name.replace('The ','').replace(' Family','')+'...';chat.appendChild(th);chat.scrollTop=chat.scrollHeight;}
  var msgs=[];var hist=S.aiH[c.id];
  for(var i=0;i<hist.length;i++){if(hist[i].role==='user'||hist[i].role==='assistant')msgs.push({role:hist[i].role,content:hist[i].content||''});}
  fetch('/.netlify/functions/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system:buildSP(c),messages:msgs})})
    .then(function(r){return r.json();})
    .then(function(data){
      var parsed = typeof data === 'string' ? JSON.parse(data) : data; var reply=(parsed.content&&parsed.content[0])?parsed.content[0].text:'Sorry, could not generate a response. Error: '+JSON.stringify(parsed);
      var isFlag=reply.indexOf('⚠️ ALLERGY FLAG')>=0;
      S.aiH[c.id].push({role:'assistant',content:reply,flag:isFlag});
      var aith=$('aith');if(aith)aith.parentNode.removeChild(aith);
      if(chat){
        var el=document.createElement('div');
        el.className='aim '+(isFlag?'flag':'ai');
        el.innerHTML=reply.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
        // Add "Add to menu" button if response contains meal suggestions
        var parsedMeals = parseAIMeals(reply);
        if (parsedMeals.length >= 2) {
          var btnWrap = document.createElement('div');
          btnWrap.style.marginTop = '10px';
          var addBtn = document.createElement('button');
          addBtn.className = 'btn bs';
          addBtn.style.fontSize = '12px';
          addBtn.innerHTML = '<i class="ti ti-calendar-plus" style="font-size:12px"></i> Add these meals to menu';
          (function(meals, clientId){ addBtn.onclick = function(){ showAddToMenuModal(clientId, meals); }; })(parsedMeals, c.id);
          btnWrap.appendChild(addBtn);
          el.appendChild(btnWrap);
        }
        chat.appendChild(el);
        chat.scrollTop=chat.scrollHeight;
      }
    })
    .catch(function(){
      var aith=$('aith');if(aith)aith.parentNode.removeChild(aith);
      if(chat){var el=document.createElement('div');el.className='aim ai';el.textContent='Connection error — please try again.';chat.appendChild(el);}
    });
}

      logHtml+='<div style="display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:0.5px solid var(--bdr);flex-wrap:wrap;gap:6px">' +
        '<div><div style="font-weight:500;font-size:13px">'+esc(e.clientName||'')+(isMgr?' · '+esc(e.userName||''):'')+'</div>' +
        '<div style="font-size:12px;color:var(--warm)">'+esc(e.date||'')+' · In: '+esc(e.clockIn||'')+' · Out: '+(e.clockOut||'—')+(e.notes?' · "'+esc(e.notes)+'"':'')+'</div></div>' +
        '<div style="display:flex;align-items:center;gap:8px">' +
          (e.duration?'<span style="font-weight:500;font-size:13px;color:var(--sage-d)">'+hrs+'h '+mins+'m</span>':'<span class="tag ta">In progress</span>') +
          (isMgr?'<button class="btn" style="padding:3px 7px;font-size:10px" onclick="editEntryM('+i+')"><i class="ti ti-edit" style="font-size:10px"></i></button>':'') +
        '</div>' +
      '</div>';
    }
    logHtml+='</div>';
  } else { logHtml='<div class="empty">No hours logged yet.</div>'; }

  var myTotalMins = 0;
  for(var i=0;i<myLog.length;i++){if(myLog[i].duration)myTotalMins+=myLog[i].duration;}
  var myHrs=Math.floor(myTotalMins/60);var myMins=myTotalMins%60;

  $('p-hours').innerHTML =
    '<h2 class="serif" style="font-size:22px;font-weight:400;margin-bottom:1rem">Hours</h2>' +
    clockSection +
    (!isMgr && myTotalMins ? '<div class="card" style="text-align:center;background:var(--sage-l);border-color:var(--sage)"><div class="serif" style="font-size:36px;color:var(--sage-d)">'+myHrs+'h '+myMins+'m</div><div style="font-size:12px;color:var(--sage-d)">Total logged</div></div>' : '') +
    adjSection + logHtml;
}

function clockIn() {
  var cid = $('ci-cid') ? parseInt($('ci-cid').value) : 0;
  if (!cid) { alert('Please select a client.'); return; }
  var c = gc(cid); var note = $('ci-note') ? $('ci-note').value : '';
  _clockInProgress = {userId: S.uid, clientId: cid, startTime: Date.now(), note: note};
  saveData(); rHours();
}
function clockOut() {
  if (!_clockInProgress) return;
  var u = tu(S.uid); var c = gc(_clockInProgress.clientId);
  var endTime = Date.now();
  var duration = Math.round((endTime - _clockInProgress.startTime) / 60000);
  var startDate = new Date(_clockInProgress.startTime);
  var endNote = $('co-note') ? $('co-note').value : '';
  var note = [_clockInProgress.note, endNote].filter(Boolean).join(' · ');
  TIME_LOG.unshift({
    id: 'tl'+Date.now(),
    userId: S.uid,
    userName: u ? u.name : '',
    clientId: _clockInProgress.clientId,
    clientName: c ? c.name : '',
    clockIn: startDate.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}),
    clockOut: new Date(endTime).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}),
    duration: duration,
    notes: note,
    date: startDate.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
  });
  _clockInProgress = null;
  addN((u?u.name:'Chef')+' clocked out — '+(c?c.name:'')+' ('+Math.floor(duration/60)+'h '+(duration%60)+'m)',['dietitian','manager'],[],{page:'hours'});
  saveData(); rHours();
}
function manualEntryM() {
  var chefs=[]; for(var i=0;i<TEAM.length;i++){if(TEAM[i].role==='chef'||TEAM[i].role==='dietitian')chefs.push(TEAM[i]);}
  var copts='<option value="">— Client —</option>'; for(var i=0;i<CLIENTS.length;i++) copts+='<option value="'+CLIENTS[i].id+'">'+esc(CLIENTS[i].name)+'</option>';
  var uopts=''; for(var i=0;i<chefs.length;i++) uopts+='<option value="'+chefs[i].id+'">'+esc(chefs[i].name)+'</option>';
  openM('<h3 class="serif">Manual time entry</h3>' +
    '<div class="fg"><label>Chef</label><select id="me-uid">'+uopts+'</select></div>' +
    '<div class="fg"><label>Client</label><select id="me-cid">'+copts+'</select></div>' +
    '<div class="fg"><label>Date</label><input id="me-date" type="date" value="'+new Date().toISOString().split('T')[0]+'"></div>' +
    '<div class="g2"><div class="fg"><label>Clock in</label><input id="me-in" type="time"></div>' +
    '<div class="fg"><label>Clock out</label><input id="me-out" type="time"></div></div>' +
    '<div class="fg"><label>Notes</label><input id="me-note" placeholder="e.g. Weekly meal prep"></div>' +
    '<button class="btn bd bfull" onclick="saveManualEntry()">Save entry</button>' +
    '<button class="mlink" onclick="closeM()">Cancel</button>');
}
function saveManualEntry() {
  var uid=$('me-uid').value;var cid=parseInt($('me-cid').value);var date=$('me-date').value;
  var inT=$('me-in').value;var outT=$('me-out').value;var note=$('me-note').value;
  if(!uid||!cid||!date||!inT||!outT){alert('Please fill in all required fields.');return;}
  var u=tu(uid);var c=gc(cid);
  // Calculate duration
  var inParts=inT.split(':');var outParts=outT.split(':');
  var inMins=parseInt(inParts[0])*60+parseInt(inParts[1]);
  var outMins=parseInt(outParts[0])*60+parseInt(outParts[1]);
  var duration=outMins-inMins;
  if(duration<=0){alert('Clock out must be after clock in.');return;}
  var dateObj=new Date(date);
  TIME_LOG.unshift({id:'tl'+Date.now(),userId:uid,userName:u?u.name:'',clientId:cid,clientName:c?c.name:'',clockIn:inT,clockOut:outT,duration:duration,notes:note,date:dateObj.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})});
  saveData();closeM();rHours();
}
function editEntryM(idx) {
  var e=TIME_LOG[idx];if(!e)return;
  openM('<h3 class="serif">Edit entry</h3>' +
    '<div class="fg"><label>Notes</label><input id="ee-note" value="'+esc(e.notes||'')+'"></div>' +
    '<div class="g2"><div class="fg"><label>Clock in</label><input id="ee-in" value="'+esc(e.clockIn||'')+'"></div>' +
    '<div class="fg"><label>Clock out</label><input id="ee-out" value="'+esc(e.clockOut||'')+'"></div></div>' +
    '<button class="btn bd bfull" onclick="saveEntryEdit('+idx+')">Save</button>' +
    '<button class="btn br bfull" style="margin-top:6px" onclick="deleteEntry('+idx+')">Delete entry</button>' +
    '<button class="mlink" onclick="closeM()">Cancel</button>');
}
function saveEntryEdit(idx) {
  var e=TIME_LOG[idx];if(!e)return;
  e.notes=$('ee-note').value;e.clockIn=$('ee-in').value;e.clockOut=$('ee-out').value;
  saveData();closeM();rHours();
}
function deleteEntry(idx) {
  if(!confirm('Delete this time entry?'))return;
  TIME_LOG.splice(idx,1);
  saveData();closeM();rHours();
}

// ── MESSAGES PAGE ─────────────────────────────────────────────────────────────
function rMsgs(){
  var cl=myC();var c=null;
  if(S.wsCid){for(var i=0;i<cl.length;i++){if(cl[i].id===S.wsCid){c=cl[i];break;}}}
  if(!c&&cl.length)c=cl[0];
  if(!c){$('p-messages').innerHTML='<div class="empty">No clients to message.</div>';return;}
  var tabs='';if(cl.length>1){tabs='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem">';for(var i=0;i<cl.length;i++){tabs+='<button class="btn'+(cl[i].id===c.id?' bs':'')+'" onclick="S.wsCid='+cl[i].id+';rMsgs()">'+esc(cl[i].contact)+'</button>';}tabs+='</div>';}
  $('p-messages').innerHTML='<h2 class="serif" style="font-size:22px;font-weight:400;margin-bottom:1rem">Messages</h2>'+tabs+'<div class="card"><div style="font-weight:500;margin-bottom:12px">'+(S.role==='client'?'Your chef — '+cn(c.chefId):'Client — '+esc(c.contact))+'</div>'+rMsgTab(c)+'</div>';
  setTimeout(function(){var t=$('mthread');if(t)t.scrollTop=t.scrollHeight;},50);
}

// ── TEAM ──────────────────────────────────────────────────────────────────────
function rTeam(){
  var byR={dietitian:[],chef:[],manager:[],client:[]};
  for(var i=0;i<TEAM.length;i++){var u=TEAM[i];if(byR[u.role])byR[u.role].push(u);}
  var lbl={dietitian:'Dietitians',chef:'Chefs',manager:'Client Experience Managers',client:'Clients'};
  var html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem"><h2 class="serif" style="font-size:22px;font-weight:400">Team & roles</h2><button class="btn bs" onclick="addTeamM()"><i class="ti ti-plus" style="font-size:13px"></i> Add</button></div>';
  var roles=['dietitian','chef','manager','client'];
  for(var ri=0;ri<roles.length;ri++){
    var role=roles[ri];var members=byR[role];if(!members.length)continue;
    html+='<div class="card"><div class="cl">'+lbl[role]+'</div>';
    for(var i=0;i<members.length;i++){
      var u=members[i];
      html+='<div class="trow"><div style="display:flex;align-items:center;gap:10px"><div style="width:32px;height:32px;border-radius:50%;background:'+(u.color||'var(--sage-l)')+';display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#2c2c2a">'+u.name.charAt(0)+'</div><div><div style="font-weight:500;font-size:13px">'+esc(u.name)+'</div><div style="font-size:12px;color:var(--warm)">'+esc(u.email||'')+'</div></div></div>' +
        '<div style="display:flex;gap:6px"><button class="btn" style="padding:4px 8px;font-size:11px" onclick="editTeamM(\''+u.id+'\')"><i class="ti ti-edit"></i></button>'+(u.id!==S.uid?'<button class="btn br" style="padding:4px 8px;font-size:11px" onclick="rmTeam(\''+u.id+'\')"><i class="ti ti-trash"></i></button>':'')+'</div></div>';
    }
    html+='</div>';
  }
  $('p-team').innerHTML=html;
}
function addTeamM(){openM('<h3 class="serif">Add team member</h3><div class="fg"><label>Full name</label><input id="tm-n" placeholder="Full name"></div><div class="fg"><label>Email</label><input id="tm-e" type="email"></div><div class="fg"><label>Password</label><input id="tm-p" type="password" placeholder="Temporary password"></div><div class="fg"><label>Role</label><select id="tm-r"><option value="dietitian">Dietitian</option><option value="chef">Chef</option><option value="manager">Client Experience Manager</option><option value="client">Client</option></select></div><button class="btn bd bfull" onclick="saveTM()">Add</button><button class="mlink" onclick="closeM()">Cancel</button>');}
function saveTM(){var n=$('tm-n').value.trim();var e=$('tm-e').value.trim().toLowerCase();var p=$('tm-p').value;var r=$('tm-r').value;if(!n||!e){alert('Name and email required.');return;}for(var i=0;i<TEAM.length;i++){if(TEAM[i].email===e){alert('Email already exists.');return;}}TEAM.push({id:'u'+Date.now(),name:n,role:r,email:e,password:p||'changeme',color:CCOLORS[TEAM.length%CCOLORS.length]});saveData();closeM();rTeam();}
function editTeamM(id){var u=null;for(var i=0;i<TEAM.length;i++){if(TEAM[i].id===id){u=TEAM[i];break;}}if(!u)return;openM('<h3 class="serif">Edit '+esc(u.name)+'</h3><div class="fg"><label>Full name</label><input id="em-n" value="'+esc(u.name)+'"></div><div class="fg"><label>Email</label><input id="em-e" value="'+esc(u.email||'')+'"></div><div class="fg"><label>New password (blank to keep)</label><input id="em-p" type="password" placeholder="Leave blank to keep"></div><div class="fg"><label>Role</label><select id="em-r"><option value="dietitian"'+(u.role==='dietitian'?' selected':'')+'>Dietitian</option><option value="chef"'+(u.role==='chef'?' selected':'')+'>Chef</option><option value="manager"'+(u.role==='manager'?' selected':'')+'>Client Experience Manager</option><option value="client"'+(u.role==='client'?' selected':'')+'>Client</option></select></div><button class="btn bd bfull" onclick="saveETM(\''+id+'\')">Save</button><button class="mlink" onclick="closeM()">Cancel</button>');}
function saveETM(id){var u=null;for(var i=0;i<TEAM.length;i++){if(TEAM[i].id===id){u=TEAM[i];break;}}if(!u)return;u.name=$('em-n').value;u.email=$('em-e').value.toLowerCase();u.role=$('em-r').value;var p=$('em-p').value;if(p)u.password=p;closeM();rTeam();}
function rmTeam(id){var u=null;for(var i=0;i<TEAM.length;i++){if(TEAM[i].id===id){u=TEAM[i];break;}}if(!u)return;var asgn=[];for(var i=0;i<CLIENTS.length;i++){if(CLIENTS[i].chefId===id)asgn.push(CLIENTS[i].name);}if(!confirm(asgn.length?'Remove '+u.name+'? Assigned to: '+asgn.join(', '):('Remove '+u.name+'?')))return;var nt=[];for(var i=0;i<TEAM.length;i++){if(TEAM[i].id!==id)nt.push(TEAM[i]);}TEAM=nt;rTeam();}

// ── NOTIFICATIONS ─────────────────────────────────────────────────────────────
function rNotif(){
  var mine=[];
  for(var i=0;i<NOTIFS.length;i++){
    var n=NOTIFS[i];var inR=false;var inU=false;
    for(var j=0;j<n.forRoles.length;j++){if(n.forRoles[j]===S.role){inR=true;break;}}
    for(var j=0;j<n.forUsers.length;j++){if(n.forUsers[j]===S.uid){inU=true;break;}}
    if(inR||inU)mine.push({n:n,i:i});
  }
  for(var i=0;i<mine.length;i++) mine[i].n.unread=false;
  updDot();
  var html='<h2 class="serif" style="font-size:22px;font-weight:400;margin-bottom:1rem">Notifications</h2><div class="card">';
  if(!mine.length){html+='<div class="empty">No notifications yet.</div>';}
  else {
    for(var i=0;i<mine.length;i++){
      var n=mine[i].n;
      var nav=n.navTarget?'onclick="handleNotifNav('+mine[i].i+')"':'';
      html+='<div class="nitem" '+nav+'><div class="nico" style="background:'+(n.color||'var(--sage-l)')+'"><i class="ti '+(n.icon||'ti-bell')+'" style="color:'+(n.ic||'var(--sage-d)')+'"></i></div><div><div style="font-size:13px;font-weight:500">'+esc(n.text)+'</div><div style="font-size:11px;color:var(--warm);margin-top:2px">'+esc(n.time||'')+(n.navTarget?'<span style="color:var(--sage-d);margin-left:8px">Tap to view →</span>':'')+'</div></div></div>';
    }
  }
  html+='</div>';
  $('p-notifications').innerHTML=html;
}
function handleNotifNav(idx){
  var n=NOTIFS[idx];if(!n||!n.navTarget)return;
  var nav=n.navTarget;
  if(nav.wsCid)S.wsCid=nav.wsCid;
  if(nav.wsTab)S.wsTab=nav.wsTab;
  go(nav.page||'clients');
}

function closeM(){$('mov').classList.remove('open');}
$('mov').addEventListener('click',function(e){if(e.target===this)closeM();});
